tools:
  - name: set_goal
    description: |
      사용자의 건강/안티에이징 목표를 자연어 한 문장으로 저장한다.
      goal 이 비어있을 때는 모든 응답에 앞서 이 도구로 먼저 등록한다.
      "체중 5kg 감량", "공복 혈당 100 이하 유지", "마라톤 풀코스 4시간 안에 완주" 같이 사용자가 직접 표현한 문장 그대로 저장.
      AI 가 임의로 다듬지 말 것 — 사용자 발화 원문 우선.
      반환: { goal: { text, updated_at } }
    inputSchema:
      type: object
      properties:
        text:
          type: string
          description: 사용자 본인이 말한 목표 문장 그대로. 한국어/영어 무관. 1~500자.
      required: [text]

  - name: define_routine_exercise
    description: |
      한 운동을 "어떤 값으로 기록하고 추이를 보여줄지" 등록한다. 마도서는 다음 목표·증량을 계산/추천하지 않는다 — 기록과 추이 표시 전용.
      progression 으로 어떤 값으로 추이를 보여줄지 + 어느 방향이 '진전'인지 선택 (표시 방향용):
        weight — 무게 (스쿼트, 벤치프레스, 머신, isolation 등). 클수록 진전으로 표시
        time — 시간 (4km 기어가기 10분→3분, 5km 러닝 30분→25분 등). 낮을수록 진전으로 표시
        distance — 거리/속도 (1시간 RowErg 12500m→13000m, 트레드밀 속도 등). 클수록 진전으로 표시
        reps — 횟수 (1세트 푸시업 max reps, 풀업 max 등 자체중). 클수록 진전으로 표시
        hold — 유지 시간 (플랭크, L-sit, 데드행 등). 클수록 진전으로 표시
      표준 인체 가정 금지 — 다리/팔이 없거나 의수·의족 사용자도 본인이 할 수 있는 형태(예 "기어가기", "한팔 푸시업")를 progression 에 맞게 등록 가능.
      같은 slug 는 덮어쓴다. AI 는 사용자와 합의된 운동만 등록 — 임의 등록 금지.

      category — 선택. progression=weight 일 때 compound/isolation 분류 라벨 (표시용). 마도서가 이 값으로 증량을 정해주지 않는다.

      계획된 세트·횟수(target_sets, target_reps, target_reps_min/max) — 사용자가 스스로 정한 계획을 기록만 한다 (마도서가 정해주지 않음):
        target_sets — 계획 세트 수. 생략 시 progression 별 기본 (weight/reps/hold=3, time/distance=1).
        target_reps — 계획 고정 횟수 (예 5x5 의 5).
        target_reps_min / target_reps_max — 계획 횟수 범위 (예 8~12). target_reps 가 같이 들어오면 무시(고정값 우선).
        모두 선택값 — 축구·테니스·등산 등도 사용자가 기록 원하면 등록 가능.

      set_size — 1세트의 고정 크기 ({ value, unit }, 선택). 진척 축(working_value)과 분리되는 "세트당 크기".
        용도: 카디오 인터벌·격투 라운드처럼 1세트의 크기는 고정이고 추이는 다른 축(속도·페이스·횟수)으로 볼 때.
        예 트레드밀 9km/h × 1분 × 20세트 → set_size={value:1, unit:"min"}, progression=distance, working_value=9, target_sets=20
        예 RowErg 2:25 페이스 × 5분 1세트 → set_size={value:5, unit:"min"}, progression=time, working_value=2.4167, target_sets=1
        예 태권도 3분 3라운드 발차기 20번 → set_size={value:3, unit:"min"}, progression=reps, working_value=20, target_sets=3, target_reps=20
        스트렝스 루틴(벤치프레스 등 reps 가 가변)에는 보통 생략. 생략 시 null.
        unit 은 자유 문자열(20자 이내). value 는 0 초과 숫자.

      working_value — 사용자가 스스로 밝힌 '현재 능력치' (기록·표시 전용). 등록 시 초기값 선택 가능. 이후 update_routine_state 로만, 사용자가 '현재 능력치를 X 로' 라고 명시할 때만 갱신. 마도서가 자동 갱신하거나 갱신을 권하지 않는다.
      memo — AI 가 계획·표시에 참고하는 자유 메모. 예 '이 머신 무게 단위 7kg', '어깨 부상 회복 중', '8월까지 가볍게'. 코드는 파싱 안 함 — 그대로 보관·표시.

      흐름: ① define_routine_exercise (등록) → ② define_split_plan (묶음, 선택) → ③ log_routine_session (실행 기록). 다음 목표는 마도서가 계산하지 않는다 — 사용자가 '다음엔 X' 라고 스스로 말하면 update_routine_state 의 next_session_goal 에 그대로 기록만 한다.
    inputSchema:
      type: object
      properties:
        slug:
          type: string
          description: snake_case 식별자. 예 squat / bench_press / crawling_4km / rowerg_1hr / push_ups_max / plank.
        display_name:
          type: string
          description: 사용자에게 보일 이름 (한글 가능). 예 "백 스쿼트", "4km 기어가기", "1시간 RowErg".
        progression:
          type: string
          description: "weight / time / distance / reps / hold 중 하나."
        unit:
          type: string
          description: "값의 단위. weight: kg/lb. time: seconds/minutes. distance: meters/km. reps: reps. hold: seconds."
        category:
          type: string
          description: "선택. progression=weight 일 때 compound 또는 isolation 분류 라벨 (표시용)."
        target_sets:
          type: integer
          description: "선택. 계획 세트 수 (1+). 생략 시 progression 별 기본 — weight/reps/hold=3, time/distance=1."
        target_reps:
          type: integer
          description: "선택. 계획 고정 횟수 (1+, 예 5x5 의 5). progression=weight/reps 에 자연스러움. target_reps_min/max 보다 우선."
        target_reps_min:
          type: integer
          description: "선택. 계획 횟수 범위 하한 (1+). target_reps_max 와 함께 사용."
        target_reps_max:
          type: integer
          description: "선택. 계획 횟수 범위 상한 (target_reps_min 이상)."
        working_value:
          type: number
          description: "선택. 사용자가 스스로 밝힌 '현재 능력치' (스쿼트 100kg, 5km 25분 등). 기록·표시 전용. 등록 시 초기 설정 가능. 이후 update_routine_state 로, 사용자가 명시할 때만 갱신."
        memo:
          type: string
          description: "선택. 자유 메모 (0~1000자). 예 '이 머신 무게 단위 7kg', '어깨 부상 회복 중', '8월까지 가볍게'. 코드는 파싱 안 함 — 그대로 보관·표시."
        set_size:
          type: object
          description: |
            선택. 1세트의 고정 크기 (카디오 인터벌·격투 라운드 등). 진척 축(working_value)과 분리.
            예 트레드밀 1분/세트 → { value: 1, unit: "min" } / 태권도 3분/라운드 → { value: 3, unit: "min" } / RowErg 5분/세트 → { value: 5, unit: "min" }.
            스트렝스(reps 가변) 루틴에는 보통 생략. unit 은 자유 문자열(예 'min', 'sec', 'm', 'km').
          properties:
            value:
              type: number
              description: "0 초과 숫자."
            unit:
              type: string
              description: "단위 라벨 (1~20자). 예 'min', 'sec', 'm'."
      required: [slug, display_name, progression, unit]

  - name: log_routine_session
    description: |
      루틴 운동의 한 세션(여러 세트 묶음)을 기록한다. 기록 전용 — 마도서는 다음 목표·증량을 계산하지 않는다.
      각 세트 구조는 routine.progression 에 따라 다름 (rpe 는 선택):
        weight: { reps, weight, rpe?, is_warmup? }
        time: { time, rpe?, is_warmup? }
        distance: { distance, rpe?, is_warmup? }
        reps: { reps, rpe?, is_warmup? }
        hold: { hold, rpe?, is_warmup? }
      rpe 는 선택 — 1~10 '힘들었음 점수' (높을수록 힘듦). 사용자가 스스로 말한 경우에만 기록.

      세트 분류 라벨 (기록·표시용):
        1) 워밍업 세트: is_warmup=true 로 표시. 추이 표시에서 본세트와 구분.
        2) 디로드 세션 (그날만 가볍게): is_deload=true. 세션 통째로 '디로드'로 표시.
        3) 슈퍼셋/자이언트셋 (여러 운동을 한 묶음으로): superset_group 에 같은 키 부여해 묶음 표시. 묶을 각 routine 의 log_routine_session 을 같은 키로 호출.

      AI 는 사용자에게 'is_warmup' / 'is_deload' / 'superset_group' 같은 코드값 노출 금지 — 사용자 발화 언어로 합의 후 내부적으로 변환.
      반환: { saved } 저장 결과만. 다음 목표를 자동으로 정하지 않는다 — 사용자가 '다음엔 X' 라고 스스로 말하면 update_routine_state 의 next_session_goal 에 기록.
    inputSchema:
      type: object
      properties:
        slug:
          type: string
          description: 등록된 routine 의 slug.
        sets:
          type: array
          description: "세트 배열. progression 에 맞는 필드 + 선택 is_warmup. 예 weight progression: { reps, weight, rpe, is_warmup? }. is_warmup=true 인 세트는 progression 추론에서 제외."
        performed_at:
          type: string
          description: "ISO 8601 시각. 생략하면 호출 시점."
        note:
          type: string
          description: 선택. 컨디션·부상 메모.
        is_deload:
          type: boolean
          description: "선택. 디로드 세션이면 true (그날만 가볍게). 세션 통째로 progression 추론 제외. 기본 false."
        superset_group:
          type: string
          description: "선택. 슈퍼셋/자이언트셋 그룹 키 (1~64자, AI 가 'ss-<짧은랜덤>' 형태로 생성). 같은 키로 호출된 다른 routine 세션들과 묶임. 각 routine progression 엔 영향 없음."
      required: [slug, sets]

  - name: log_activity
    description: |
      루틴(progression 추이) 대상이 아닌 자유 활동을 기록한다 (산책, 등산, 풋살, 가벼운 자전거 등).
      활동량 로깅용 — name + intensity + duration_minutes 만 받음.
      만약 사용자가 "이거 추이 보고 싶어" 라고 하면 log_activity 대신 define_routine_exercise (progression 적절히 선택) 으로 등록.
      마도서는 kcal·강도를 추정/해석하지 않는다 — 사용자가 말한 활동명·강도·시간을 그대로 기록.
    inputSchema:
      type: object
      properties:
        name:
          type: string
          description: "활동명 자유 텍스트. 예 '한강 자전거', '동네 산책'."
        intensity:
          type: string
          description: "light / moderate / vigorous 중 하나. AI 가 사용자 발화로 보조 판단."
        duration_minutes:
          type: integer
          description: 분 단위.
        performed_at:
          type: string
          description: "ISO 8601 시각. 생략하면 호출 시점."
        note:
          type: string
      required: [name, intensity, duration_minutes]

  - name: define_metric
    description: |
      추적할 건강 지표를 등록한다.
      당뇨인은 fasting_glucose / post_meal_glucose / hba1c,
      체성분 추적은 body_weight_kg / body_fat_pct / skeletal_muscle_kg,
      고혈압은 systolic_bp / diastolic_bp / resting_hr —
      사람마다 다른 슬러그. AI 는 goal 을 읽고 합의된 지표만 등록 (임의 등록 금지).
      target_min/max 는 선택 — 사용자가 본인 기준 범위를 직접 알려줄 때만 기록 (마도서가 정상범위를 정하지 않는다). 모르면 생략.
      priority=critical 은 위젯/요약에서 상위 표시 + 사용자가 정한 범위를 벗어나면 강조 표시.
    inputSchema:
      type: object
      properties:
        slug:
          type: string
          description: "snake_case 슬러그. fasting_glucose / body_fat_pct / systolic_bp 등."
        display_name:
          type: string
          description: 사용자에게 보일 이름 (한글 가능).
        unit:
          type: string
          description: "단위 문자열. mg/dL, kg, %, mmHg, bpm 등."
        target_min:
          type: number
          description: 선택. 정상범위 하한.
        target_max:
          type: number
          description: 선택. 정상범위 상한.
        priority:
          type: string
          description: "critical / high / normal 중 하나."
      required: [slug, display_name, unit, priority]

  - name: record_metric
    description: |
      등록된 지표의 측정값 한 건을 기록한다.
      반환에 사용자가 정한 범위 대비 위치 + 직전값 대비 변화 + 7일 평균 대비 변화 (사실·추이만).
      마도서 이름으로 의학적 진단·처방·해석을 하지 않는다. AI 가 의견을 말하려면 '마도서 기록이 아니라 제(AI) 개인 판단'이라고 분리해 밝히고 전문가 상담도 함께 권한다.
    inputSchema:
      type: object
      properties:
        slug:
          type: string
        value:
          type: number
        measured_at:
          type: string
          description: "ISO 8601 시각. 생략하면 호출 시점."
        context:
          type: string
          description: "선택. 'fasting', 'post_meal', 'morning' 등 컨텍스트 태그."
      required: [slug, value]

  - name: log_meal
    description: |
      끼 한 건을 기록·수정·프리셋 등록·프리셋 호출을 모두 처리하는 통합 도구. 먹은 것을 기록만 한다 — 마도서가 식단을 짜거나 적정 섭취량을 추천하지 않는다.

      4가지 모드 (조합 가능):
        ① 신규 등록 — id 생략, name 필수, 영양 필드 선택.
        ② 수정 (upsert) — id 에 기존 끼니의 전체 key ('meal:...') 전달 (get_state.meals_today.items[].id 에서 가져옴). 같은 key 덮어쓰기.
        ③ 프리셋 등록 — as_preset_slug 와 함께 호출 시 끼 기록 + 프리셋 동시 저장 (meal_preset:{slug} 키). 같은 slug 면 덮어쓰기. AI 는 사용자 합의 후에만.
        ④ 프리셋 호출 — from_preset_slug 와 함께 호출 시 프리셋의 영양값을 기본값으로 사용. 호출 args 가 명시한 값은 override 우선. name 도 생략 가능 (프리셋 name 사용).

      영양 필드(kcal/protein_g/carbs_g/fat_g)는 모두 선택 — 사용자가 알려준 값만 기록, 모르면 비워둠.
      사용자가 직접 정한 daily_kcal_reference(하루 기준 칼로리)가 있으면 오늘 합계와의 차이(today_delta_kcal)도 함께 반환 — 단순 비교 표시용. 마도서가 적정량을 계산/추천하지 않는다.

      반환 { saved, id, today_totals, daily_kcal_reference, today_delta_kcal, preset_used, preset_saved }. id/slug 사용자 노출 금지.
    inputSchema:
      type: object
      properties:
        name:
          type: string
          description: "끼 이름/메뉴. 예 '아침 — 오트밀+그릭요거트'. from_preset_slug 사용 시 생략 가능 (프리셋 name 사용)."
        kcal:
          type: number
        protein_g:
          type: number
        carbs_g:
          type: number
        fat_g:
          type: number
        eaten_at:
          type: string
          description: "ISO 8601 시각. 생략하면 호출 시점."
        id:
          type: string
          description: "선택. 수정 모드 — 기존 끼니의 전체 key ('meal:...' 형식). 생략하면 새 끼니 등록."
        as_preset_slug:
          type: string
          description: "선택. snake_case slug. 이 끼니의 영양값을 같은 이름의 프리셋으로도 저장 (meal_preset:{slug} 키). 같은 slug 면 덮어쓰기. AI 가 사용자 합의 후 호출."
        from_preset_slug:
          type: string
          description: "선택. snake_case slug. 기존 프리셋(meal_preset:{slug})에서 영양값을 자동 채움. 호출 args 가 명시한 값은 override 우선. get_state.meal_presets[].slug 에서 가져옴."
      required: []

  - name: define_reminder
    description: |
      알람을 등록한다 — supplement(영양제) / measurement(측정) / action(행동) 모두 같은 통로.
      예: "비타민D 매일 9시" (supplement), "아침 공복 혈당 7시" (measurement, target_metric_slug=fasting_glucose), "1일 3회 인슐린 8/13/19시" (action).
      schedule 표현: "daily HH:MM" 또는 "daily HH:MM,HH:MM,...". 시각은 settings.timezone 기준.
      window_minutes 안에 ack 가 안 들어오면 푸시. 같은 id 면 덮어쓴다.
    inputSchema:
      type: object
      properties:
        id:
          type: string
          description: snake_case 식별자.
        kind:
          type: string
          description: "supplement / measurement / action 중 하나."
        label:
          type: string
          description: "사용자에게 보일 라벨. 예 '비타민D 1정', '공복 혈당 측정'."
        schedule:
          type: string
          description: "'daily 09:00' 또는 'daily 08:00,13:00,19:00'."
        window_minutes:
          type: integer
          description: "선택. 슬롯 시각부터 N분 안에 ack 안 되면 푸시. 기본 15."
        target_metric_slug:
          type: string
          description: "선택. measurement 일 때 어떤 metric 의 측정인지. ack 시 value 같이 주면 자동 record_metric 호출."
      required: [id, kind, label, schedule]

  - name: ack_reminder
    description: |
      알람 슬롯에 대한 acknowledge 를 기록한다.
      slot 형식 'YYYY-MM-DDTHH:MM' — 생략하면 호출 시점 기준 가장 가까운 과거 슬롯.
      ack 가 들어오면 푸시 워커가 같은 슬롯에 알람을 또 쏘지 않는다.
      measurement 알람이고 value 가 같이 들어오면 자동으로 record_metric 도 호출.
    inputSchema:
      type: object
      properties:
        id:
          type: string
        slot:
          type: string
          description: "선택. 'YYYY-MM-DDTHH:MM' 형식 (settings.timezone 기준 날짜)."
        value:
          type: number
          description: "선택. measurement 알람일 때 같이 들어온 측정값."
      required: [id]

  - name: define_user_fact
    description: |
      4축 카테고리 중 하나에 사용자에 대한 자유 형식 사실(fact)을 저장한다.
      마도서가 사전에 정의할 수 없는 정보(헬스장 장비/바 무게, 의수·의족, 알레르기, 복용약, 식단 제약, 직업·수면 등) 를 AI 가 분류해서 적재한다.

      축:
        exercise — 운동 환경/장비/제약. 예: 헬스장 최소 plate 증분 (slug `min_plate_increment_kg`, value `{ v: 2.5 }`), 사용 가능한 기구 목록, 왼팔 의족 등 신체적 제한
        health_metric — 알레르기, 복용 약물, 만성질환, 가족력
        diet_reminder — 식단 제약(비건/저탄수/케토), 카페인·알코올 한도, 단식 윈도우
        baseline — 변하지 않거나 천천히 변하는 본인 정보. 직업, 평균 수면 시간, 흡연·음주 상태, 거주 도시

      AI 가 지켜야 할 절차 (위반 시 사용자 신뢰 손상):
        1. 사용자 발화에서 사실 후보를 식별
        2. 사용자 발화 언어로 분류 의도 명시 + 합의 — 영문 axis 값/slug 노출 금지. 사용자가 한국어 화자면 한국어, 영어 화자면 영어, 다른 언어면 그 언어로.
           축 자연어 표현 예시 (한국어): exercise → "운동 환경/장비/제약", health_metric → "건강 관련 정보(알레르기·복용약·만성질환 등)", diet_reminder → "식단 제약/알람 관련", baseline → "기본 정보(직업·수면·생활패턴 등)"
           축 자연어 표현 예시 (영어): exercise → "workout environment/equipment/constraints", health_metric → "health-related info (allergies, meds, conditions)", diet_reminder → "diet constraints / reminders", baseline → "baseline info (job, sleep, lifestyle)"
           다른 언어는 의미 보존하며 그 언어로 자연 번역.
           좋은 예 (한국어): "이거 운동 환경 정보로 저장할게요 — '헬스장 최소 증분 2.5kg'"
           좋은 예 (영어): "Logging this as workout environment — gym minimum plate increment 2.5kg"
           나쁜 예: "exercise 카테고리에 min_plate_increment_kg 으로 넣을게요"
        3. 사용자 합의를 받은 뒤에만 호출
        4. 축이 모호하면 두 선택지를 사용자 언어로 풀어서 직접 질문 — AI 단독 결정 금지

      value 는 항상 object 로 저장. 스칼라(숫자/문자열/불린)는 `{ v: 값 }` 으로 감싼다 — 일관된 형식 유지용.
      목록은 `{ items: [...] }`, 구조체는 자유 키.
      같은 (axis, slug) 면 덮어쓴다.
    inputSchema:
      type: object
      properties:
        axis:
          type: string
          description: "exercise / health_metric / diet_reminder / baseline 중 하나."
        slug:
          type: string
          description: "snake_case 식별자. 예 min_plate_increment_kg / left_arm_prosthetic / peanut_allergy / diet_vegan."
        label:
          type: string
          description: "사용자에게 보일 한글/자유 라벨. 예 '최소 plate 증분', '왼팔 의족', '땅콩 알레르기'."
        value:
          type: object
          additionalProperties: true
          description: "임의 구조. 스칼라는 { v: ... } 로 감싸기. 예 { v: 2.5 }, { items: ['땅콩','갑각류'] }, { side: 'left', since: '2020' }."
      required: [axis, slug, label, value]

  - name: define_split_plan
    description: |
      분할 계획을 등록한다 — 운동을 묶음(bucket)으로 묶고, 언제(요일/순환/자유) 할지 매핑.
      같은 slug 면 덮어쓴다. is_active=true 면 다른 plan 들은 자동 비활성.
      여러 plan 저장 가능(시각화·비교용) — 활성은 1개만.

      buckets — 운동 묶음 배열. 각 [{ key, label, routine_slugs }].
        key: 묶음 식별자(예 "A","B","push","pull","upper"). 짧고 사람이 알아보기 쉬운 것.
        label: 사용자에게 보일 이름. 예 "가슴/삼두".
        routine_slugs: 이 묶음에 들어가는 등록된 routine slug 들.

      assignment — 묶음 → 시점 매핑.
        kind=weekly: 요일 매핑. map: { mon, tue, wed, thu, fri, sat, sun → bucket key 또는 null(휴식). }
        kind=sequence: 순환. order: ["A","B","C","D"]. get_state 가 최근 세션 보고 다음 차례 추론.
        kind=freestyle: 매핑 없음 — 묶음만 등록해두고 매번 자유 선택. AI 가 사용자에게 묶음 보여주고 골라달라고 함.

      체리피커(어떤 묶음도 없이 등록된 routine 중에서 매번 골라하는 경우)는 split_plan 등록 안 함 — define_split_plan 호출하지 말 것.

      예시:
        4분할 순환: buckets=[A:가슴/삼두, B:등/이두, C:하체, D:어깨/복근], assignment={kind:"sequence", order:["A","B","C","D"]}
        주간 5분할: assignment={kind:"weekly", map:{mon:"A", tue:"B", wed:"C", thu:"D", fri:"E", sat:null, sun:null}}
        자유 그룹핑: assignment={kind:"freestyle"} — 묶음만 정의

      활성 plan 바꾸려면: AI 가 get_state 로 기존 plan 읽어서 같은 buckets/assignment 로 is_active=true 만 바꿔 재호출.
    inputSchema:
      type: object
      properties:
        slug:
          type: string
          description: snake_case 식별자. 예 four_day_split / weekly_5day / freestyle_groups.
        name:
          type: string
          description: "사용자에게 보일 이름. 예 '근비대 4분할 A→B→C→D', '주간 5분할'."
        buckets:
          type: array
          description: "묶음 배열. [{key, label, routine_slugs:[...]}]. 1개 이상."
        assignment:
          type: object
          additionalProperties: true
          description: "묶음 → 시점 매핑. {kind:'weekly', map:{mon,tue,...}} 또는 {kind:'sequence', order:[...]} 또는 {kind:'freestyle'}."
        is_active:
          type: boolean
          description: "선택. true 면 이 plan 활성화 + 기존 활성 plan 자동 비활성. 생략 시 false."
      required: [slug, name, buckets, assignment]

  - name: update_routine_state
    description: |
      등록된 routine 의 비-구조 필드(현재 능력치·계획·메모·다음 목표)를 부분 업데이트한다 (patch). 기록 전용.
      같은 slug 의 routine 이 이미 있어야 함. 제공된 필드만 덮어쓰고, 생략한 필드는 그대로 유지.
      필드를 명시적으로 클리어하려면 null 로 명시 (예 working_value: null, memo: null 또는 "").

      display_name — 사용자에게 보일 라벨만 변경 (구조 영향 X). set_size 추가 시 라벨에 같은 정보(분/세트 시간 등) 중복이면 정리. 예 'RowErg (5분짜리)' → 'RowErg'. 1~200자.
      working_value — 사용자가 스스로 밝힌 '현재 능력치'. 사용자가 '현재 능력치를 X 로' 라고 명시할 때만 갱신. 마도서가 갱신을 권하거나 자동 갱신하지 않는다.
      memo — 자유 메모 (0~1000자). 예 '이 머신 무게 단위 7kg', '어깨 부상 회복 중'. 코드는 파싱 안 함 — 그대로 보관·표시.
      next_session_goal — 다음 세션 목표를 사용자가 직접 지정 ({ value, note? }). 사용자가 '다음엔 100kg 해볼래' 같이 스스로 표현했을 때만 사용. source 는 'manual' 로 마크. 마도서가 자동으로 채우지 않는다.
      target_sets / target_reps / target_reps_min / target_reps_max — 사용자가 정한 계획 조정.
      set_size — 1세트 고정 크기 ({value, unit}). null 로 클리어. 보통 등록 시점에 정함 — 운영 중 변경은 드뭄.

      구조 변경 (progression / unit / category) 이 필요하면 define_routine_exercise 재호출 — 그 경우 working_value/memo 도 같이 다시 명시해야 보존됨.
    inputSchema:
      type: object
      properties:
        slug:
          type: string
          description: 업데이트할 routine 의 slug.
        display_name:
          type: string
          description: "선택. 라벨 새 값 (1~200자). set_size 추가/변경 시 라벨 중복 정리에 사용 — 예 'RowErg (5분짜리)' → 'RowErg'."
        working_value:
          type: number
          description: "선택. 사용자가 밝힌 '현재 능력치' 새 값 (0 이상). null 로 명시하면 클리어."
        memo:
          type: string
          description: "선택. 메모 새 값 (0~1000자). null 또는 빈 문자열로 클리어."
        target_sets:
          type: integer
          description: "선택. 계획 세트수 (1 이상)."
        target_reps:
          type: integer
          description: "선택. 계획 고정 횟수 (1 이상). null 로 명시하면 클리어 (그러면 min/max 가능)."
        target_reps_min:
          type: integer
          description: "선택. 계획 횟수 범위 하한. null 로 명시하면 클리어 (max 도 같이)."
        target_reps_max:
          type: integer
          description: "선택. 계획 횟수 범위 상한."
        next_session_goal:
          type: object
          description: |
            선택. 다음 세션 목표를 사용자가 직접 지정. { value: number, note?: string(0~200자) }.
            null 로 명시하면 클리어. source 는 'manual' 로 마크. 마도서가 자동으로 채우거나 덮어쓰지 않는다.
          properties:
            value:
              type: number
            note:
              type: string
        set_size:
          type: object
          description: "선택. 1세트 고정 크기 새 값 { value, unit }. null 로 명시하면 클리어."
          properties:
            value:
              type: number
            unit:
              type: string
      required: [slug]

  - name: delete_entity
    description: |
      등록된 entity 또는 과거 기록 한 건을 삭제한다. 사용자가 명시적으로 "지워줘" / "잘못 입력했어" 라고 한 경우에만 호출.

      두 부류:
        정의(definition) — routine / metric / reminder / fact / split_plan / meal_preset: id 는 slug (또는 reminder id, meal_preset 은 프리셋 slug). 정의 자체만 삭제, 과거 기록은 남음.
        기록(record) — meal / measure / session / activity: id 는 전체 storage key (prefix 포함). get_state 에서 가져옴:
          meal → meals_today.items[].id ('meal:...')
          measure → metrics[].latest_id ('measure:slug:...')
          session → routines[].last_session.id ('session:slug:...')
          activity → recent_activities[].id ('activity:...')

      session 삭제는 그 기록만 지운다 — 사용자가 직접 정한 next_session_goal 은 건드리지 않는다 (재계산/클리어 없음).

      끼니(meal) 의 단순 수정(name/kcal/macro 등 값만 변경)은 delete 대신 log_meal({id:..., ...새 값}) upsert 사용 — 단순. delete 는 진짜로 없애야 할 때만.
      id 는 사용자에게 절대 노출 금지 — AI 가 내부에서 get_state 조회 후 사용.
    inputSchema:
      type: object
      properties:
        kind:
          type: string
          description: "routine / metric / reminder / fact / split_plan / meal_preset / meal / measure / session / activity 중 하나."
        id:
          type: string
          description: "정의는 slug (reminder 는 reminder id, meal_preset 은 프리셋 slug). 기록은 'meal:...' / 'measure:slug:...' / 'session:slug:...' / 'activity:...' 형식의 전체 storage key — get_state 에서 가져옴."
        axis:
          type: string
          description: "kind=fact 일 때만 필수. exercise / health_metric / diet_reminder / baseline 중 하나."
      required: [kind, id]

  - name: get_state
    description: |
      마도서의 현재 상태를 통째로 반환한다 — 응답에 앞서 반드시 호출. 기록·시각화 전용이라 어떤 추천값도 계산하지 않는다.
      ※ 모든 도구 응답(이 도구 포함)에 _guard 가 동봉된다 — { scope, no_advice, liability, if_ai_insists_on_advice, disclaimer }.
        마도서는 어떤 조언에도 책임이 없고, 조언의 책임은 전적으로 AI 본인에게 있다. AI 가 굳이 조언하려면 _guard.disclaimer 문구를 사용자에게 그대로 먼저 보여준 뒤 마도서와 분리해 말해야 한다. disclaimer 없이는 조언 금지.
      반환:
        - _guard: 조언금지·면책 가드 (모든 응답 공통). disclaimer = 사용자에게 그대로 보여줄 면책 문구.
        - protocol_step: 'awaiting_goal' / 'awaiting_initial_setup' / 'operational'
        - ai_rules: AI 가 매 응답마다 지켜야 할 규약 (마도서 이름으로 의학·식이·운동 조언/추천/식단작성 금지, 조언은 AI 본인 판단으로 분리 표시, 빈 추론 금지, 시각은 timezone 기준, user_fact 축 합의 절차 등)
        - recommended_next_action: 현 단계에서 AI 가 다음으로 해야 할 행동의 짧은 힌트
        - goal: { text, updated_at } 또는 null
        - settings: { timezone, daily_kcal_reference }
        - server_now / server_now_local: 추측 금지용 서버 기준 시각
        - metrics: 등록 지표들 + 각각의 최근 측정값(latest_id 포함) + 사용자가 정한 범위 대비 위치 + 7일 평균 + 샘플 수
        - routines: 등록 루틴들 + 각각의 progression + 최근 세션(last_session.id 포함) + progression_state ({ working_value, current_value, current_at, pr_value, pr_at, baseline_value, baseline_at, direction }) + memo + next_session_goal ({ value, computed_at, source: 'manual', note })
        - recent_activities: 최근 7일 비루틴 활동 (각 항목에 id 포함 — delete_entity 용)
        - meals_today: 오늘(timezone 기준) 끼 합계 + 항목 (items[].id — log_meal upsert / delete_entity 용)
        - meal_presets: 등록된 끼 프리셋 [{slug, name, kcal, protein_g, carbs_g, fat_g, defined_at}]. slug 는 log_meal({from_preset_slug}) 또는 delete_entity({kind:'meal_preset', id:slug}) 에 사용. 사용자에게 slug 노출 금지 — name 으로 자연어 표현.
        - reminders: 등록 알람들 + 오늘 슬롯별 상태(future/due/acked/missed)
        - user_facts: { exercise, health_metric, diet_reminder, baseline } — 축별 fact 묶음
        - split_plans: 등록된 모든 분할 계획 목록
        - active_split_plan: 활성 plan + today_bucket(weekly) 또는 next_bucket_hint(sequence). 없으면 null.
      list_* 함수 대신 이 함수가 모든 조회를 커버한다.

user_settings:
  - key: timezone
    type: string
    default: "Asia/Seoul"
    description: "IANA timezone. 알람 시각·오늘 날짜 판단 기준. 예 Asia/Seoul / America/Los_Angeles."
  - key: daily_kcal_reference
    type: number
