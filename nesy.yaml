# nesy.app.getmuscle — 심장이 득근득근해지는 마법 (건강 마도서)
#
# 호출 AI (Claude / ChatGPT / Gemini) 의 외장 기억장치.
# 마도서는 추천하지 않고, 기록 / 돌려줌 / 검증된 공식으로 계산만 한다.
#
# 핵심 컨셉:
#   - 사용자 목표는 자연어로 저장 (체중 위주 사람도, 혈당 위주 사람도, 체지방 위주 사람도 동시 지원).
#   - 어떤 metric / exercise / reminder 를 추적할지는 AI 가 목표를 보고 판단 → 사용자 합의 → 등록.
#   - 마도서는 metric · exercise · reminder · meal 의 통로만 제공. 항목 구성은 유동적.
#
# AI 행동 규약 (get_state.meta 에서도 동일하게 보고됨):
#   - 어떤 응답·추천·계산 전에도 반드시 get_state 를 먼저 호출 (빈 추론 금지).
#   - goal 이 null 이면 무조건 먼저 set_goal (사용자에게 자연어로 묻고 description 그대로 저장).
#   - metrics / exercises 가 비어있으면 propose_setup_from_goal → 사용자 합의 → set_*.
#   - 사용자가 안 말한 metric / exercise / reminder 를 마음대로 등록하지 말 것.
#   - 날짜 / 시각 추측 금지. settings.timezone 기준 today / now_minutes 사용.
#   - 의학적 진단·처방 흉내 금지 — in_target_range=false 면 사실만 전달.
#   - compute_next_load 결과 무게에 자체적으로 가감 금지.

tools:
  # ═══════════════════════════════════════════════════════════════════
  # Goal — 자연어 목표
  # ═══════════════════════════════════════════════════════════════════
  - name: set_goal
    description: |
      사용자의 건강 목표를 자연어로 저장. 마도서의 기준점.
      예: "체중을 70kg 까지 줄이면서 근육량은 유지하고 싶어." / "당뇨 관리 — 식후 혈당 180 안 넘기기" /
          "마라톤 완주 준비. 6개월 안에 풀코스."
      목표 자체에 수치를 강제하지 않음 — 사람마다 목표 형태가 다름 (체중·체지방·혈당·심박·근비대·지구력 등).
      이 함수 호출 직후 호출 AI 는 propose_setup_from_goal 로 추천 setup 을 받아 사용자에게 보여주고
      합의된 항목만 set_metric / set_exercise / set_reminder 로 등록할 것.
      같은 사용자가 다시 부르면 description 갱신 (set_at 은 첫 등록 시각 유지).
    inputSchema:
      type: object
      required: [description]
      properties:
        description:
          type: string
          description: |
            자연어 목표 문장. 1자 이상 1000자 이하. 사용자 발화 그대로가 좋음 — 의역·요약 금지.

  # ═══════════════════════════════════════════════════════════════════
  # Exercise — 루틴 운동 정의 (사용자가 정기적으로 하는 운동)
  # ═══════════════════════════════════════════════════════════════════
  - name: set_exercise
    description: |
      루틴 운동 정의 한 건 등록·수정 (upsert). 같은 slug 면 덮어쓰기.
      compute_next_load 가 사용할 baseline — 등록 안 된 운동은 세션 기록 불가.
      비루틴 (산책·축구·자전거 등 일회성) 은 record_activity 사용 — 등록 불필요.
      isolation 운동은 compute_next_load 가 Refalo 2024 계수 ×0.7 자동 적용.
    inputSchema:
      type: object
      required: [slug, display_name, category]
      properties:
        slug:
          type: string
          description: "snake_case 영문 시작. 예: 'squat', 'bench_press', 'incline_dumbbell_press'."
        display_name:
          type: string
          description: "사용자에게 보일 이름. 한국어 가능."
        category:
          type: string
          description: "'compound' (스쿼트·벤치·데드 등 다관절) | 'isolation' (컬·익스텐션 등 단관절)."
        current_pr_kg:
          type: number
          description: "1RM 또는 측정된 최대 무게 kg. 모르면 생략."

  - name: delete_exercise
    description: |
      루틴 운동 정의 영구 삭제. 과거 세션 기록은 보존.
      일시 중단이면 그냥 안 부르면 됨 — 굳이 삭제할 필요 X.
    inputSchema:
      type: object
      required: [slug]
      properties:
        slug: { type: string }

  - name: record_session
    description: |
      루틴 운동 한 세션 기록. exercise_slug 는 set_exercise 로 등록된 슬러그여야 함 (없으면 에러).
      각 세트의 weight_kg / reps 필수, rir 선택. 사용자가 "스쿼트 80kg 5회 3세트" 보고하면
      [{weight_kg:80, reps:5}, {weight_kg:80, reps:5}, {weight_kg:80, reps:5}].
      직전 세트 대비 15% 이상 증량이면 응답에 heavy_jump_warning — 호출 AI 가 사용자에게 그대로 전달.
      최고 무게가 current_pr_kg 갱신하면 자동 update.
    inputSchema:
      type: object
      required: [exercise_slug, sets]
      properties:
        exercise_slug:
          type: string
          description: "set_exercise 로 등록된 슬러그."
        sets:
          type: array
          description: |
            세트 배열. 각 원소 { weight_kg: number (봉 포함 kg), reps: integer, rir?: integer (Reps In Reserve 0-5) }.
        note:
          type: string

  # ═══════════════════════════════════════════════════════════════════
  # 비루틴 활동 (산책·축구·자전거 등)
  # ═══════════════════════════════════════════════════════════════════
  - name: record_activity
    description: |
      비루틴 신체 활동 한 건 기록. "어제 축구 1시간 했어" / "오늘 산책 30분" / "자전거 20km" 처리.
      name 은 자유 텍스트 (snake_case 강제 X). duration_min / intensity / distance_km 모두 선택.
      get_state 의 recent_activities 와 대시보드에 표시.
    inputSchema:
      type: object
      required: [name]
      properties:
        name:
          type: string
          description: "활동 이름 자유 텍스트. 예: '축구', '산책', '자전거', '등산'."
        duration_min:
          type: number
          description: "소요 시간 분."
        intensity:
          type: string
          description: "'low' (걷기 수준) | 'moderate' (조깅·축구) | 'high' (전력질주·인터벌)."
        distance_km:
          type: number
        performed_at:
          type: string
          description: "ISO timestamp. 생략하면 현재. 사용자가 '어제' 라 하면 그에 맞춰 채울 것."
        note:
          type: string

  # ═══════════════════════════════════════════════════════════════════
  # 건강지표 — AI 가 목표 기반으로 정의 → 사용자 합의 → 등록
  # ═══════════════════════════════════════════════════════════════════
  - name: set_metric
    description: |
      건강지표 정의 한 건 등록·수정 (upsert). 마도서가 추적할 지표는 사용자별로 완전히 다름:
      당뇨인은 fasting_glucose / post_meal_glucose / hba1c, 근비대 추구자는 body_weight / body_fat_pct / skeletal_muscle_kg,
      고혈압인은 systolic_bp / diastolic_bp ... 등.
      이 함수는 사용자가 합의한 지표만 등록 — 호출 AI 가 멋대로 등록 금지.
      target_min / target_max 는 의학 가이드라인이 아니라 사용자 목표 기준 — 사용자가 명시한 값만 사용.
      priority: critical (매일 추적) / high (주간) / normal (월간 이하).
    inputSchema:
      type: object
      required: [slug, display_name, unit, priority]
      properties:
        slug:
          type: string
          description: "snake_case. 예: 'body_weight', 'fasting_glucose', 'ldl_mg_dl', 'resting_heart_rate'."
        display_name:
          type: string
        unit:
          type: string
          description: "측정 단위 자유 텍스트. 예: 'kg', 'mg/dL', '%', 'bpm', 'mmHg'."
        target_min:
          type: number
          description: "사용자 목표 하한. 생략하면 하한 없음."
        target_max:
          type: number
          description: "사용자 목표 상한. 생략하면 상한 없음."
        priority:
          type: string
          description: "'critical' (매일) | 'high' (주간) | 'normal' (월간 이하)."
        frequency_hint:
          type: string
          description: "측정 빈도 자유 텍스트 힌트. 예: 'daily_morning_fasted', 'weekly', 'quarterly'."

  - name: delete_metric
    description: |
      건강지표 정의 영구 삭제. 과거 측정 기록은 보존.
    inputSchema:
      type: object
      required: [slug]
      properties:
        slug: { type: string }

  - name: record_metric
    description: |
      건강지표 측정 한 건 기록. slug 는 set_metric 으로 등록된 것 필수.
      반환값에 in_target_range, delta_from_previous, delta_from_7d_avg 포함 —
      호출 AI 는 이걸 보고 사용자에게 사실만 전달. 단정·진단 금지.
      context 는 자유 텍스트: 'fasted_morning', 'post_run', 'with_meal' 등 측정 맥락.
    inputSchema:
      type: object
      required: [slug, value]
      properties:
        slug:
          type: string
          description: "set_metric 로 등록된 슬러그."
        value:
          type: number
        measured_at:
          type: string
          description: "ISO timestamp. 생략하면 현재."
        context:
          type: string
          description: "측정 맥락 자유 텍스트."
        note:
          type: string

  # ═══════════════════════════════════════════════════════════════════
  # 식단 — 칼로리·매크로 추적이 필요한 사용자만 사용
  # ═══════════════════════════════════════════════════════════════════
  - name: record_meal
    description: |
      식단 한 끼 기록. 모든 영양 필드 선택 — 사용자가 추적하는 것만 채움 (이름만 기록도 OK).
      사진 받으면 호출 AI 가 사진 분석 → 사용자 컨펌 → 그 결과만 이 함수로. 컨펌 없이 추정 금지.
      반환값에 오늘 누적 (kcal / protein_g / carbs_g / fat_g) 포함 — 그 날 추세 파악용.
      칼로리 유지·결핍·잉여 해석은 get_state 의 maintenance_estimate (BMR metric + activity_factor 합의된 경우) 기준.
    inputSchema:
      type: object
      properties:
        kcal: { type: number }
        protein_g: { type: number }
        carbs_g: { type: number }
        fat_g: { type: number }
        name:
          type: string
          description: "음식 이름. 한국어 자유 텍스트. 예: '연어 샐러드'."
        note:
          type: string
        eaten_at:
          type: string
          description: "ISO timestamp. 생략하면 현재."

  # ═══════════════════════════════════════════════════════════════════
  # Reminder — 영양제·약·측정·행동 통합 알람
  # ═══════════════════════════════════════════════════════════════════
  - name: set_reminder
    description: |
      알람 정의 한 건 등록·수정 (upsert). 영양제 / 약 복용, 혈당·혈압 측정, 인슐린 주사 같은 행동
      모두 이 한 통로로 처리 — 도메인별 별도 알람 X.
      type 으로 분류: 'supplement' / 'measurement' / 'action'.
      schedule_times 안에 들면 슬롯 시각 ± window_minutes 안에 record_reminder_ack 없으면 Web Push 1회.
      윈도우 놓치면 그 슬롯은 영원히 알림 안 옴 (잔소리 방지) — 다음 슬롯에서 새로 시작.
      every_n_days 로 격일·주1회 가능. start_date / end_date 로 한시 복용약 표현.
    inputSchema:
      type: object
      required: [slug, display_name, schedule_times, type]
      properties:
        slug:
          type: string
          description: "snake_case. 예: 'vitamin_d', 'insulin_basal', 'morning_glucose_check', 'evening_stretch'."
        display_name:
          type: string
        schedule_times:
          type: array
          description: "'HH:MM' 24h 배열. 예: ['09:00'] 또는 ['07:00','12:00','19:00']."
        every_n_days:
          type: integer
          description: "복용·실행 주기. 1=매일 (기본), 2=격일, 7=주1회."
        window_minutes:
          type: integer
          description: "슬롯 시각 + N분 윈도우. 기본 30."
        type:
          type: string
          description: "'supplement' (영양제·약) | 'measurement' (혈당·혈압 측정) | 'action' (스트레칭·주사 등 행동)."
        notes:
          type: string
          description: "알림 body 에 함께 표시될 자유 메모. 예: '식사 후', '1캡슐', '왼팔 피하주사'."
        start_date:
          type: string
          description: "YYYY-MM-DD. 이 날짜 전엔 알림 안 옴."
        end_date:
          type: string
          description: "YYYY-MM-DD. 이 날짜 후엔 알림 안 옴. 한시 복용약에 유용."

  - name: delete_reminder
    description: |
      알람 정의 영구 삭제. 과거 ack 기록은 보존.
      일시 중단이면 end_date 추가가 더 안전.
    inputSchema:
      type: object
      required: [slug]
      properties:
        slug: { type: string }

  - name: record_reminder_ack
    description: |
      알람 응답 한 건 기록. 사용자가 "비타민D 방금 먹었어" / "혈당 측정했어" 보고하면 호출.
      slot_iso 가 윈도우 안이면 해당 슬롯 알림이 자동으로 안 나감 (1회 정책).
      slot_iso 생략하면 현재 시각 기준 가장 가까운 슬롯 자동 매칭.
      윈도우 밖이면 'off_schedule' 로 기록 — 기록은 되지만 다음 슬롯은 정상 감시.
    inputSchema:
      type: object
      required: [slug]
      properties:
        slug:
          type: string
        slot_iso:
          type: string
          description: "응답한 슬롯의 ISO. 생략 시 자동 매칭."
        note:
          type: string

  # ═══════════════════════════════════════════════════════════════════
  # 조회 / 계산
  # ═══════════════════════════════════════════════════════════════════
  - name: get_state
    description: |
      마도서 종합 상태 스냅샷. 호출 AI 는 어떤 응답·추천 전에도 반드시 먼저 호출.
      반환:
        - goal              : 자연어 목표 (null 이면 set_goal 먼저)
        - exercises         : 등록 루틴 + last_session
        - recent_sessions   : 최근 7개 세션
        - recent_activities : 최근 7개 비루틴 활동
        - metrics           : 등록 지표 + latest_value + in_target_range
        - meals_today       : 오늘 식단 + 누적 + maintenance_estimate (조건부)
        - reminders         : 활성 알람 + 오늘 ack 카운트
        - next_reminder_slot: 다음 미 ack 슬롯
        - missing_setup     : 비어있는 필수 항목
        - stale_records     : 14일+ 측정 없는 지표
        - meta              : AI 행동 규약 (protocol_step / next_recommended_action / ai_should_not / goal_coherence_hint)
      meta.protocol_step:
        - awaiting_goal           : set_goal 부터
        - awaiting_initial_setup  : propose_setup_from_goal → set_*
        - operational             : 정상 운영
    inputSchema:
      type: object
      properties: {}

  - name: compute_next_load
    description: |
      등록된 루틴 운동의 다음 세션 권장 무게 계산. 검증된 공식만 사용:
        - Helms RIR off-target 1당 약 4% 보정
        - Plotkin 2022 주간 5% 증량 상한
        - Refalo 2024 isolation 계수 ×0.7
      호출 AI 는 반환된 weight / phase / reasoning / sources 를 사용자에게 그대로 전달.
      자체적으로 무게 가감 금지. 등록 안 된 운동·기록 없는 운동은 에러.
    inputSchema:
      type: object
      required: [exercise_slug]
      properties:
        exercise_slug:
          type: string
        target_reps:
          type: integer
          description: "이번 세션 목표 반복수. 기본 5."
        target_rir:
          type: integer
          description: "이번 세션 목표 RIR. 기본 2."

  - name: propose_setup_from_goal
    description: |
      현재 goal description 기반 추천 metric / exercise / reminder 셋업.
      LLM 호출 없는 키워드 매칭 (당뇨·근비대·다이어트·러닝·콜레스테롤·고혈압 등).
      호출 AI 는 결과를 사용자에게 그대로 보여주고, 사용자가 동의한 항목만 set_* 호출 — 멋대로 등록 X.
      매칭 안 된 케이스도 generic 추천 (body_weight) 반환 — 빈 응답 X.
    inputSchema:
      type: object
      properties: {}

# ═════════════════════════════════════════════════════════════════════
# 사용자 설정 — 최소 (timezone 만 필수, 나머지는 사용자별 도메인이 너무 달라서 metric 으로 처리)
# ═════════════════════════════════════════════════════════════════════
user_settings:
  - key: timezone
    type: string
    default: "Asia/Seoul"
    description: |
      IANA timezone. 알림 시각 판단·오늘 날짜 계산용. 슬롯이 '09:00' 이면 이 timezone 의 9시에 워커가 알림.
      해외 출장 시 변경.

  - key: activity_factor
    type: number
    default: null
    description: |
      BMR 곱셈 활동계수. 1.2(좌식) / 1.375(가벼움) / 1.55(중간) / 1.725(높음) / 1.9(매우높음).
      null 이면 호출 AI 가 사용자에게 활동량 묻고 update — 임의 가정 금지.
      get_state.meals_today.maintenance_estimate 는 (BMR metric 등록 + activity_factor 설정) 조건일 때만 계산.

