tools:
  - name: set_goal
    description: |
      사용자의 건강/안티에이징 목표를 자연어 한 문장으로 저장한다.
      goal 이 비어있을 때는 모든 응답에 앞서 이 도구로 먼저 등록한다.
      "체중 5kg 감량", "공복 혈당 100 이하 유지", "마라톤 풀코스 4시간 안에 완주" 같이 사용자가 직접 표현한 문장 그대로 저장.
      AI 가 임의로 다듬지 말 것 — 사용자 발화 원문 우선.
      반환: { goal: { text, updated_at } }
    inputSchema:
      type: object
      properties:
        text:
          type: string
          description: 사용자 본인이 말한 목표 문장 그대로. 한국어/영어 무관. 1~500자.
      required: [text]

  - name: define_exercise
    description: |
      개별 운동(동작) 하나를 "어떤 값으로 기록하고 추이를 보여줄지" 등록한다. 마도서는 다음 목표·증량을 계산/추천하지 않는다 — 기록·추이 표시 전용.
      운동은 '원자'다. 여러 운동을 엮은 '루틴(레시피)'은 define_routine 으로 따로 만든다.
      progression — 어떤 값으로 추이를 보고 어느 방향이 '진전'인지 (표시용):
        weight 무게(클수록) / time 시간(낮을수록) / distance 거리·속도(클수록) / reps 횟수(클수록) / hold 유지시간(클수록).
      표준 인체 가정 금지 — 다리/팔이 없거나 의수·의족 사용자도 본인이 할 수 있는 형태("기어가기" 등)로 등록 가능.
      같은 slug 는 덮어쓴다. 사용자와 합의된 운동만 등록 — 임의 등록 금지.

      baseline_value(현재 기준값) — 사용자가 스스로 밝힌 '현재 능력치'. 위젯 입력 기본값으로 쓰이고, 그 운동을 쓰는 모든 루틴에 반영. 등록 시 초기값 선택 가능. 이후 update_exercise 로만, 사용자가 확인할 때만 갱신. 마도서가 자동 갱신/권유하지 않는다.
      default_* — 루틴이 따로 정하지 않을 때 쓰는 기본 처방값(사용자가 정한 계획을 기록만): default_sets(생략 시 weight/reps/hold=3, time/distance=1) / default_reps 고정횟수 / default_reps_min·max 범위.
      set_size — 1세트 고정 크기({value,unit}, 선택). 카디오 인터벌·격투 라운드 등. 위젯에 '세트당 N{unit}' 표시. 스트렝스엔 보통 생략.
      category — progression=weight 일 때 compound/isolation 분류 라벨(표시용). 마도서가 이 값으로 증량을 정하지 않는다.
      memo — 자유 메모. 코드는 파싱 안 함 — 그대로 보관·표시.
      흐름: ① define_exercise → ② define_routine(선택) → ③ define_schedule(선택) → ④ log_workout.
    inputSchema:
      type: object
      properties:
        slug:
          type: string
          description: snake_case 식별자. 예 squat / bench_press / plank / run_5k.
        display_name:
          type: string
          description: 사용자에게 보일 이름 (한글 가능). 예 "백 스쿼트", "5km 달리기".
        progression:
          type: string
          description: "weight / time / distance / reps / hold 중 하나."
        unit:
          type: string
          description: "값의 단위. weight: kg/lb. time: 분/초. distance: m/km. reps: 회. hold: 초."
        category:
          type: string
          description: "선택. progression=weight 일 때 compound 또는 isolation (표시용)."
        baseline_value:
          type: number
          description: "선택. 사용자가 밝힌 '현재 능력치'(스쿼트 100kg, 5km 28분 등, 0 이상). 위젯 입력 기본값·표시 전용."
        default_sets:
          type: integer
          description: "선택. 기본 세트수(1+). 생략 시 weight/reps/hold=3, time/distance=1. 루틴 블록이 덮어쓸 수 있음."
        default_reps:
          type: integer
          description: "선택. 기본 고정 횟수(1+). default_reps_min/max 보다 우선."
        default_reps_min:
          type: integer
          description: "선택. 기본 횟수 범위 하한(1+). max 와 함께."
        default_reps_max:
          type: integer
          description: "선택. 기본 횟수 범위 상한(min 이상)."
        set_size:
          type: object
          description: "선택. 1세트 고정 크기. 예 태권도 3분/라운드 → { value: 3, unit: 'min' }. unit 자유(1~20자), value 0 초과."
          properties:
            value:
              type: number
            unit:
              type: string
        memo:
          type: string
          description: "선택. 자유 메모(0~1000자). 코드는 파싱 안 함 — 그대로 보관·표시."
      required: [slug, display_name, progression, unit]

  - name: define_routine
    description: |
      여러 운동을 엮은 '루틴(레시피)'을 등록한다 — AI 가 사용자 자연어를 blocks 로 구조화한다. 사용자에게 문법/형식을 묻지 말 것.
      사용자가 '스쿼트 5×5 하고 벤치랑 로우 슈퍼셋 3라운드' 처럼 말하면 → 원문을 source_text 에 그대로 보관 + 각 동작을 알맞은 block 으로 만든다.
      blocks 의 운동(items[].exercise_slug)은 먼저 define_exercise 로 등록돼 있어야 한다. 같은 slug 면 덮어쓴다. 마도서는 추천하지 않는다 — 사용자가 말한 구성만 기록.

      각 block:
        block_id — 짧은 식별자(생략 시 b1,b2.. 자동). 기록(log_workout)이 여기에 매달림.
        kind — 반복 종류. 알려진 종류는 위젯이 맞춤 표시:
          straight 일반세트(3×5) / range 횟수범위(3×8-12) / superset 슈퍼셋 / circuit 서킷 / amrap 시간내최대 /
          emom 매분 / interval 인터벌 / pyramid 피라미드 / dropset 드롭세트 / single 단일(카디오·유지) / activity 일반활동(테니스 등).
          딱 맞는 게 없으면 kind='custom'(또는 자유 문자열) + note 로 — 어떤 방식도 거부되지 않음(위젯이 note 로 폴백 표시).
        label — ★ 사람이 읽는 한국어 설명(필수, 1~200자). 사용자에겐 이 label 만 보인다. 예 '벤치+바벨로우 슈퍼셋 3라운드'.
        items — 이 블록의 운동들. 1개=단일, 2개+=슈퍼셋/서킷. 각 { exercise_slug, sets?, reps?, reps_min?, reps_max?, target_value?, set_size? } — 이 루틴에서만 쓰는 처방 덮어쓰기(생략 시 운동의 default_* 사용).
        prescription — kind 별 계획값(자유 object): superset/circuit 의 rounds, amrap 의 time_cap{value,unit}, emom 의 minutes, interval 의 rounds/work/rest, pyramid 의 steps[], dropset 의 drops[] 등.
        params — 특이 방식용 자유 칸(위 어디에도 안 맞을 때). note 와 함께 위젯이 폴백 표시.
        note — 한 줄 자연어 설명(위젯이 못 그리는 방식의 안내용).

      kind/block_id/slug 는 사용자에게 절대 노출 금지 — label/source_text(자연어)로만 말한다.
    inputSchema:
      type: object
      properties:
        slug:
          type: string
          description: snake_case 식별자. 예 push_a / full_body / leg_day.
        display_name:
          type: string
          description: 사용자에게 보일 루틴 이름. 예 "푸시 A", "전신 루틴".
        source_text:
          type: string
          description: "사용자가 말한 원문 그대로(0~2000자). 위젯에 사람 글로 노출 — '마도서가 지어낸 게 아님'을 보장."
        blocks:
          type: array
          description: "블록 배열(1개 이상). 각 { block_id?, kind, label, items:[{exercise_slug, sets?, reps?, reps_min?, reps_max?, target_value?, set_size?}], prescription?, params?, note? }."
        memo:
          type: string
          description: "선택. 자유 메모(0~1000자)."
      required: [slug, display_name, blocks]

  - name: log_workout
    description: |
      운동 실행 한 세션을 기록한다 — 블록·운동·세트별 실제값. 기록 전용 (마도서는 다음 목표·증량을 계산하지 않는다).
      routine_slug — 어느 루틴을 했는지(define_routine 의 slug). 정해둔 루틴 없이 즉흥이면 '_adhoc' 또는 생략.
      blocks — 한 세션의 블록들. 각 { block_id, kind?, entries:[{ exercise_slug, sets:[...] }], rounds_completed? }.
        entries — 그 블록에서 한 운동별 실제 세트. 슈퍼셋/서킷이면 한 block 의 entries 에 여러 운동을 같은 block_id 로 넣는다(꼬리표 불필요).
        각 세트 구조는 그 운동의 progression 에 따름 (rpe 선택):
          weight { reps, weight, rpe?, is_warmup? } / time { time, ... } / distance { distance, ... } / reps { reps, ... } / hold { hold, ... }.
        rpe 1~10 '힘들었음 점수' — 사용자가 스스로 말한 경우만.
        rounds_completed(선택) — amrap/슈퍼셋 등에서 '완료 라운드 수'.
      세트 분류(추이 계산에서 자동 분리): sets[].is_warmup=true 워밍업 / is_deload=true 그날 전체 가볍게 한 날(세션 레벨).
      코드값(is_warmup/is_deload/kind/block_id) 사용자 노출 금지 — 사용자 발화 언어로 합의 후 내부 변환.
      반환 { saved }. 다음 목표는 사용자가 '다음엔 X' 라고 스스로 말할 때만 update_exercise 의 next_session_goal 에 기록.
    inputSchema:
      type: object
      properties:
        routine_slug:
          type: string
          description: "한 루틴(define_routine)의 slug. 정해둔 루틴 없이 즉흥이면 '_adhoc' 또는 생략."
        blocks:
          type: array
          description: "블록 배열(1개 이상). 각 { block_id, kind?, entries:[{ exercise_slug, sets:[progression 에 맞는 세트들] }], rounds_completed? }."
        is_deload:
          type: boolean
          description: "선택. 그날 전체 가볍게 한 날이면 true. 세션 통째로 progression 추론 제외. 기본 false."
        performed_at:
          type: string
          description: "ISO 8601 시각. 생략하면 호출 시점."
        note:
          type: string
          description: 선택. 컨디션·부상 메모.
      required: [blocks]

  - name: log_activity
    description: |
      루틴(progression 추이) 대상이 아닌 자유 활동을 기록한다 (산책, 등산, 풋살, 가벼운 자전거 등).
      활동량 로깅용 — name + intensity + duration_minutes 만 받음.
      만약 사용자가 "이거 추이 보고 싶어" 라고 하면 log_activity 대신 define_routine_exercise (progression 적절히 선택) 으로 등록.
      마도서는 kcal·강도를 추정/해석하지 않는다 — 사용자가 말한 활동명·강도·시간을 그대로 기록.
    inputSchema:
      type: object
      properties:
        name:
          type: string
          description: "활동명 자유 텍스트. 예 '한강 자전거', '동네 산책'."
        intensity:
          type: string
          description: "light / moderate / vigorous 중 하나. AI 가 사용자 발화로 보조 판단."
        duration_minutes:
          type: integer
          description: 분 단위.
        performed_at:
          type: string
          description: "ISO 8601 시각. 생략하면 호출 시점."
        note:
          type: string
      required: [name, intensity, duration_minutes]

  - name: define_metric
    description: |
      추적할 건강 지표를 등록한다.
      당뇨인은 fasting_glucose / post_meal_glucose / hba1c,
      체성분 추적은 body_weight_kg / body_fat_pct / skeletal_muscle_kg,
      고혈압은 systolic_bp / diastolic_bp / resting_hr —
      사람마다 다른 슬러그. AI 는 goal 을 읽고 합의된 지표만 등록 (임의 등록 금지).
      target_min/max 는 선택 — 사용자가 본인 기준 범위를 직접 알려줄 때만 기록 (마도서가 정상범위를 정하지 않는다). 모르면 생략.
      priority=critical 은 위젯/요약에서 상위 표시 + 사용자가 정한 범위를 벗어나면 강조 표시.
    inputSchema:
      type: object
      properties:
        slug:
          type: string
          description: "snake_case 슬러그. fasting_glucose / body_fat_pct / systolic_bp 등."
        display_name:
          type: string
          description: 사용자에게 보일 이름 (한글 가능).
        unit:
          type: string
          description: "단위 문자열. mg/dL, kg, %, mmHg, bpm 등."
        target_min:
          type: number
          description: 선택. 정상범위 하한.
        target_max:
          type: number
          description: 선택. 정상범위 상한.
        priority:
          type: string
          description: "critical / high / normal 중 하나."
      required: [slug, display_name, unit, priority]

  - name: record_metric
    description: |
      등록된 지표의 측정값 한 건을 기록한다.
      반환에 사용자가 정한 범위 대비 위치 + 직전값 대비 변화 + 7일 평균 대비 변화 (사실·추이만).
      마도서 이름으로 의학적 진단·처방·해석을 하지 않는다. AI 가 의견을 말하려면 '마도서 기록이 아니라 제(AI) 개인 판단'이라고 분리해 밝히고 전문가 상담도 함께 권한다.
    inputSchema:
      type: object
      properties:
        slug:
          type: string
        value:
          type: number
        measured_at:
          type: string
          description: "ISO 8601 시각. 생략하면 호출 시점."
        context:
          type: string
          description: "선택. 'fasting', 'post_meal', 'morning' 등 컨텍스트 태그."
      required: [slug, value]

  - name: log_meal
    description: |
      끼 한 건을 기록·수정·프리셋 등록·프리셋 호출을 모두 처리하는 통합 도구. 먹은 것을 기록만 한다 — 마도서가 식단을 짜거나 적정 섭취량을 추천하지 않는다.

      4가지 모드 (조합 가능):
        ① 신규 등록 — id 생략, name 필수, 영양 필드 선택.
        ② 수정 (upsert) — id 에 기존 끼니의 전체 key ('meal:...') 전달 (get_state.meals_today.items[].id 에서 가져옴). 같은 key 덮어쓰기.
        ③ 프리셋 등록 — as_preset_slug 와 함께 호출 시 끼 기록 + 프리셋 동시 저장 (meal_preset:{slug} 키). 같은 slug 면 덮어쓰기. AI 는 사용자 합의 후에만.
        ④ 프리셋 호출 — from_preset_slug 와 함께 호출 시 프리셋의 영양값을 기본값으로 사용. 호출 args 가 명시한 값은 override 우선. name 도 생략 가능 (프리셋 name 사용).

      영양 필드(kcal/protein_g/carbs_g/fat_g)는 모두 선택 — 사용자가 알려준 값만 기록, 모르면 비워둠.
      사용자가 직접 정한 daily_kcal_reference(하루 기준 칼로리)가 있으면 오늘 합계와의 차이(today_delta_kcal)도 함께 반환 — 단순 비교 표시용. 마도서가 적정량을 계산/추천하지 않는다.

      반환 { saved, id, today_totals, daily_kcal_reference, today_delta_kcal, preset_used, preset_saved }. id/slug 사용자 노출 금지.
    inputSchema:
      type: object
      properties:
        name:
          type: string
          description: "끼 이름/메뉴. 예 '아침 — 오트밀+그릭요거트'. from_preset_slug 사용 시 생략 가능 (프리셋 name 사용)."
        kcal:
          type: number
        protein_g:
          type: number
        carbs_g:
          type: number
        fat_g:
          type: number
        eaten_at:
          type: string
          description: "ISO 8601 시각. 생략하면 호출 시점."
        id:
          type: string
          description: "선택. 수정 모드 — 기존 끼니의 전체 key ('meal:...' 형식). 생략하면 새 끼니 등록."
        as_preset_slug:
          type: string
          description: "선택. snake_case slug. 이 끼니의 영양값을 같은 이름의 프리셋으로도 저장 (meal_preset:{slug} 키). 같은 slug 면 덮어쓰기. AI 가 사용자 합의 후 호출."
        from_preset_slug:
          type: string
          description: "선택. snake_case slug. 기존 프리셋(meal_preset:{slug})에서 영양값을 자동 채움. 호출 args 가 명시한 값은 override 우선. get_state.meal_presets[].slug 에서 가져옴."
      required: []

  - name: define_reminder
    description: |
      알람을 등록한다 — supplement(영양제) / measurement(측정) / action(행동) 모두 같은 통로.
      예: "비타민D 매일 9시" (supplement), "아침 공복 혈당 7시" (measurement, target_metric_slug=fasting_glucose), "1일 3회 인슐린 8/13/19시" (action).
      schedule 표현: "daily HH:MM" 또는 "daily HH:MM,HH:MM,...". 시각은 settings.timezone 기준.
      window_minutes 안에 ack 가 안 들어오면 푸시. 같은 id 면 덮어쓴다.
    inputSchema:
      type: object
      properties:
        id:
          type: string
          description: snake_case 식별자.
        kind:
          type: string
          description: "supplement / measurement / action 중 하나."
        label:
          type: string
          description: "사용자에게 보일 라벨. 예 '비타민D 1정', '공복 혈당 측정'."
        schedule:
          type: string
          description: "'daily 09:00' 또는 'daily 08:00,13:00,19:00'."
        window_minutes:
          type: integer
          description: "선택. 슬롯 시각부터 N분 안에 ack 안 되면 푸시. 기본 15."
        target_metric_slug:
          type: string
          description: "선택. measurement 일 때 어떤 metric 의 측정인지. ack 시 value 같이 주면 자동 record_metric 호출."
      required: [id, kind, label, schedule]

  - name: ack_reminder
    description: |
      알람 슬롯에 대한 acknowledge 를 기록한다.
      slot 형식 'YYYY-MM-DDTHH:MM' — 생략하면 호출 시점 기준 가장 가까운 과거 슬롯.
      ack 가 들어오면 푸시 워커가 같은 슬롯에 알람을 또 쏘지 않는다.
      measurement 알람이고 value 가 같이 들어오면 자동으로 record_metric 도 호출.
    inputSchema:
      type: object
      properties:
        id:
          type: string
        slot:
          type: string
          description: "선택. 'YYYY-MM-DDTHH:MM' 형식 (settings.timezone 기준 날짜)."
        value:
          type: number
          description: "선택. measurement 알람일 때 같이 들어온 측정값."
      required: [id]

  - name: define_user_fact
    description: |
      4축 카테고리 중 하나에 사용자에 대한 자유 형식 사실(fact)을 저장한다.
      마도서가 사전에 정의할 수 없는 정보(헬스장 장비/바 무게, 의수·의족, 알레르기, 복용약, 식단 제약, 직업·수면 등) 를 AI 가 분류해서 적재한다.

      축:
        exercise — 운동 환경/장비/제약. 예: 헬스장 최소 plate 증분 (slug `min_plate_increment_kg`, value `{ v: 2.5 }`), 사용 가능한 기구 목록, 왼팔 의족 등 신체적 제한
        health_metric — 알레르기, 복용 약물, 만성질환, 가족력
        diet_reminder — 식단 제약(비건/저탄수/케토), 카페인·알코올 한도, 단식 윈도우
        baseline — 변하지 않거나 천천히 변하는 본인 정보. 직업, 평균 수면 시간, 흡연·음주 상태, 거주 도시

      AI 가 지켜야 할 절차 (위반 시 사용자 신뢰 손상):
        1. 사용자 발화에서 사실 후보를 식별
        2. 사용자 발화 언어로 분류 의도 명시 + 합의 — 영문 axis 값/slug 노출 금지. 사용자가 한국어 화자면 한국어, 영어 화자면 영어, 다른 언어면 그 언어로.
           축 자연어 표현 예시 (한국어): exercise → "운동 환경/장비/제약", health_metric → "건강 관련 정보(알레르기·복용약·만성질환 등)", diet_reminder → "식단 제약/알람 관련", baseline → "기본 정보(직업·수면·생활패턴 등)"
           축 자연어 표현 예시 (영어): exercise → "workout environment/equipment/constraints", health_metric → "health-related info (allergies, meds, conditions)", diet_reminder → "diet constraints / reminders", baseline → "baseline info (job, sleep, lifestyle)"
           다른 언어는 의미 보존하며 그 언어로 자연 번역.
           좋은 예 (한국어): "이거 운동 환경 정보로 저장할게요 — '헬스장 최소 증분 2.5kg'"
           좋은 예 (영어): "Logging this as workout environment — gym minimum plate increment 2.5kg"
           나쁜 예: "exercise 카테고리에 min_plate_increment_kg 으로 넣을게요"
        3. 사용자 합의를 받은 뒤에만 호출
        4. 축이 모호하면 두 선택지를 사용자 언어로 풀어서 직접 질문 — AI 단독 결정 금지

      value 는 항상 object 로 저장. 스칼라(숫자/문자열/불린)는 `{ v: 값 }` 으로 감싼다 — 일관된 형식 유지용.
      목록은 `{ items: [...] }`, 구조체는 자유 키.
      같은 (axis, slug) 면 덮어쓴다.
    inputSchema:
      type: object
      properties:
        axis:
          type: string
          description: "exercise / health_metric / diet_reminder / baseline 중 하나."
        slug:
          type: string
          description: "snake_case 식별자. 예 min_plate_increment_kg / left_arm_prosthetic / peanut_allergy / diet_vegan."
        label:
          type: string
          description: "사용자에게 보일 한글/자유 라벨. 예 '최소 plate 증분', '왼팔 의족', '땅콩 알레르기'."
        value:
          type: object
          additionalProperties: true
          description: "임의 구조. 스칼라는 { v: ... } 로 감싸기. 예 { v: 2.5 }, { items: ['땅콩','갑각류'] }, { side: 'left', since: '2020' }."
      required: [axis, slug, label, value]

  - name: define_schedule
    description: |
      배치(분할 계획)를 등록한다 — '루틴'을 묶음(bucket)으로 묶고, 언제(요일/순환/자유) 할지 매핑. 옛 split_plan 의 후신.
      ★ 묶음은 개별 운동이 아니라 '루틴(define_routine)'을 가리킨다(routine_v2_slugs).
      같은 slug 면 덮어쓴다. is_active=true 면 다른 배치 자동 비활성(활성 1개). 여러 배치 저장 가능(비교용).

      buckets — 묶음 배열. 각 { key, label, routine_v2_slugs }.
        key: 묶음 식별자(예 "push","pull","full"). label: 사용자에게 보일 이름. routine_v2_slugs: 이 묶음의 등록된 루틴 slug 들.
      assignment — 묶음 → 시점 매핑.
        kind=weekly: 요일 매핑. map: { mon..sun → bucket key 또는 null(휴식) }.
        kind=sequence: 순환. order: ["A","B","C"]. get_state 가 최근 기록 보고 다음 차례 추론.
        kind=freestyle: 매핑 없음 — 묶음만 등록, 매번 자유 선택.
      체리피커(매번 골라하는 경우)는 배치 등록 안 함 — define_schedule 호출하지 말 것.

      활성 배치 바꾸려면: get_state 로 기존 배치 읽어 같은 buckets/assignment 로 is_active=true 만 바꿔 재호출.
    inputSchema:
      type: object
      properties:
        slug:
          type: string
          description: snake_case 식별자. 예 weekly_split / four_day_cycle.
        name:
          type: string
          description: "사용자에게 보일 이름. 예 '주간 분할', '4분할 A→B→C→D'."
        buckets:
          type: array
          description: "묶음 배열. [{ key, label, routine_v2_slugs:[...] }]. 1개 이상. routine_v2_slugs 는 등록된 루틴 slug."
        assignment:
          type: object
          additionalProperties: true
          description: "묶음 → 시점 매핑. {kind:'weekly', map:{mon,tue,...}} 또는 {kind:'sequence', order:[...]} 또는 {kind:'freestyle'}."
        is_active:
          type: boolean
          description: "선택. true 면 이 배치 활성화 + 기존 활성 자동 비활성. 생략 시 false."
      required: [slug, name, buckets, assignment]

  - name: update_exercise
    description: |
      등록된 운동(exercise)의 비-구조 필드(현재 기준값·기본 처방·메모·다음 목표·라벨)를 부분 업데이트한다 (patch). 기록 전용.
      같은 slug 의 운동이 이미 있어야 함. 제공된 필드만 덮어쓰고 생략한 필드는 유지. 명시적 클리어는 null.

      baseline_value — 사용자가 밝힌 '현재 기준값/능력치'. ★ 사용자가 기준값보다 잘해서 '바꿀까요?'에 '예' 했을 때, 또는 '현재 능력치를 X 로' 라고 명시할 때만 갱신(source 자동 마크). 마도서가 자동 갱신/권유하지 않는다. 위젯의 '바꿀까요?'는 제안이 아니라 실제 한 값을 반영할지 묻는 것.
      display_name — 라벨만 변경(구조 영향 X). 1~200자.
      memo — 자유 메모(0~1000자). 코드 파싱 안 함.
      next_session_goal — 다음 목표를 사용자가 직접 지정 ({ value, note? }). 사용자가 '다음엔 100kg' 처럼 스스로 말할 때만. source='manual'. 마도서가 자동으로 채우지 않는다.
      default_sets / default_reps / default_reps_min / default_reps_max — 사용자가 정한 기본 처방 조정.
      set_size — 1세트 고정 크기({value,unit}). null 로 클리어.
      구조 변경(progression/unit/category)이 필요하면 define_exercise 재호출.
    inputSchema:
      type: object
      properties:
        slug:
          type: string
          description: 업데이트할 운동의 slug.
        display_name:
          type: string
          description: "선택. 라벨 새 값(1~200자)."
        baseline_value:
          type: number
          description: "선택. '현재 기준값' 새 값(0 이상). null 로 명시하면 클리어."
        memo:
          type: string
          description: "선택. 메모 새 값(0~1000자). null 또는 빈 문자열로 클리어."
        default_sets:
          type: integer
          description: "선택. 기본 세트수(1 이상)."
        default_reps:
          type: integer
          description: "선택. 기본 고정 횟수(1 이상). null 로 클리어(그러면 min/max 가능)."
        default_reps_min:
          type: integer
          description: "선택. 기본 횟수 범위 하한. null 로 클리어(max 도 같이)."
        default_reps_max:
          type: integer
          description: "선택. 기본 횟수 범위 상한."
        next_session_goal:
          type: object
          description: |
            선택. 다음 목표를 사용자가 직접 지정. { value: number, note?: string(0~200자) }.
            null 로 명시하면 클리어. source='manual'. 마도서가 자동으로 채우거나 덮어쓰지 않는다.
          properties:
            value:
              type: number
            note:
              type: string
        set_size:
          type: object
          description: "선택. 1세트 고정 크기 { value, unit }. null 로 클리어."
          properties:
            value:
              type: number
            unit:
              type: string
      required: [slug]

  - name: update_routine
    description: |
      등록된 루틴(define_routine)의 라벨·원문·블록·메모를 부분 업데이트한다 (patch). 사용자가 '이 루틴에서 로우 빼줘' 처럼 말하면 AI 가 새 blocks 로 다시 구조화해 넣는다.
      같은 slug 의 루틴이 이미 있어야 함. 제공된 필드만 덮어쓴다. blocks 를 주면 통째로 교체(부분 아님).
    inputSchema:
      type: object
      properties:
        slug:
          type: string
          description: 업데이트할 루틴의 slug.
        display_name:
          type: string
          description: "선택. 루틴 이름 새 값(1~200자)."
        source_text:
          type: string
          description: "선택. 사용자 원문 새 값(0~2000자). null 또는 빈 문자열로 클리어."
        blocks:
          type: array
          description: "선택. 블록 배열 통째 교체(define_routine 과 같은 형식, 1개 이상)."
        memo:
          type: string
          description: "선택. 메모(0~1000자). null 또는 빈 문자열로 클리어."
      required: [slug]

  - name: delete_entity
    description: |
      등록된 entity 또는 과거 기록 한 건을 삭제한다. 사용자가 명시적으로 "지워줘" / "잘못 입력했어" 라고 한 경우에만 호출.

      두 부류:
        정의(definition) — exercise / routine_v2 / schedule / metric / reminder / fact / meal_preset: id 는 slug (reminder 는 reminder id, meal_preset 은 프리셋 slug). 정의 자체만 삭제, 과거 기록은 남음.
        기록(record) — meal / measure / workout / activity: id 는 전체 storage key (prefix 포함). get_state 에서 가져옴:
          meal → meals_today.items[].id ('meal:...')
          measure → metrics[].latest_id ('measure:slug:...')
          workout → exercises[].last_session.id ('workout:...')
          activity → recent_activities[].id ('activity:...')

      workout 삭제는 그 기록만 지운다 — 사용자가 직접 정한 next_session_goal 은 건드리지 않는다 (재계산/클리어 없음).

      끼니(meal) 의 단순 수정(name/kcal/macro 등 값만 변경)은 delete 대신 log_meal({id:..., ...새 값}) upsert 사용 — 단순. delete 는 진짜로 없애야 할 때만.
      id 는 사용자에게 절대 노출 금지 — AI 가 내부에서 get_state 조회 후 사용.
    inputSchema:
      type: object
      properties:
        kind:
          type: string
          description: "exercise / routine_v2 / schedule / metric / reminder / fact / meal_preset / meal / measure / workout / activity 중 하나."
        id:
          type: string
          description: "정의는 slug (reminder 는 reminder id, meal_preset 은 프리셋 slug). 기록은 'meal:...' / 'measure:slug:...' / 'workout:...' / 'activity:...' 형식의 전체 storage key — get_state 에서 가져옴."
        axis:
          type: string
          description: "kind=fact 일 때만 필수. exercise / health_metric / diet_reminder / baseline 중 하나."
      required: [kind, id]

  - name: migrate_legacy
    description: |
      [일회용] 옛 운동 데이터(v1: routine/split_plan/session)를 새 모델(v2: exercise/routine_v2/schedule/workout)로 옮긴다.
      기본은 미리보기(dry-run) — 무엇을 옮길지 보고만 하고 쓰지 않는다. apply:true 일 때만 실제로 새 키 기록 + 옛 키 삭제.
      매핑: working_value→baseline_value, target_*→default_*, 슈퍼셋(superset_group)은 superset 블록으로 복원, 분할 묶음은 묶음마다 routine_v2 생성 후 schedule 이 가리킴.
      여러 번 실행해도 안전(이미 있는 새 키는 건너뜀). 마이그레이션 완료 후 이 도구는 제거 예정.
      반환: { migration: { mode, exercises, workouts, schedules, deletions, warnings } }
    inputSchema:
      type: object
      properties:
        apply:
          type: boolean
          description: "false(기본)=미리보기만. true=실제 적용(새 키 기록 + 옛 키 삭제)."

  - name: get_state
    description: |
      마도서의 현재 상태를 통째로 반환한다 — 응답에 앞서 반드시 호출. 기록·시각화 전용이라 어떤 추천값도 계산하지 않는다.
      ※ 모든 도구 응답(이 도구 포함)에 _guard 가 동봉된다 — { scope, no_advice, liability, if_ai_insists_on_advice, disclaimer }.
        마도서는 어떤 조언에도 책임이 없고, 조언의 책임은 전적으로 AI 본인에게 있다. AI 가 굳이 조언하려면 _guard.disclaimer 문구를 사용자에게 그대로 먼저 보여준 뒤 마도서와 분리해 말해야 한다. disclaimer 없이는 조언 금지.
      반환:
        - _guard: 조언금지·면책 가드 (모든 응답 공통). disclaimer = 사용자에게 그대로 보여줄 면책 문구.
        - protocol_step: 'awaiting_goal' / 'awaiting_initial_setup' / 'operational'
        - ai_rules: AI 가 매 응답마다 지켜야 할 규약 (마도서 이름으로 의학·식이·운동 조언/추천/식단작성 금지, 조언은 AI 본인 판단으로 분리 표시, 빈 추론 금지, 시각은 timezone 기준, user_fact 축 합의 절차 등)
        - recommended_next_action: 현 단계에서 AI 가 다음으로 해야 할 행동의 짧은 힌트
        - goal: { text, updated_at } 또는 null
        - settings: { timezone, daily_kcal_reference }
        - server_now / server_now_local: 추측 금지용 서버 기준 시각
        - metrics: 등록 지표들 + 각각의 최근 측정값(latest_id 포함) + 사용자가 정한 범위 대비 위치 + 7일 평균 + 샘플 수
        - exercises: 등록 운동(원자)들 + progression + baseline_value + 최근 세션(last_session.id='workout:...' 포함) + progression_state ({ working_value, current_value, current_at, pr_value, pr_at, baseline_value, baseline_at, direction }) + memo + next_session_goal ({ value, source:'manual', note })
        - routines_v2: 등록 루틴(레시피)들 — { slug, display_name, source_text, blocks:[{ block_id, kind, label, items, prescription, params, note }] }
        - recent_activities: 최근 7일 비루틴 활동 (각 항목에 id 포함 — delete_entity 용)
        - meals_today: 오늘(timezone 기준) 끼 합계 + 항목 (items[].id — log_meal upsert / delete_entity 용)
        - meal_presets: 등록된 끼 프리셋 [{slug, name, kcal, protein_g, carbs_g, fat_g, defined_at}]. slug 는 log_meal({from_preset_slug}) 또는 delete_entity({kind:'meal_preset', id:slug}) 에 사용. 사용자에게 slug 노출 금지 — name 으로 자연어 표현.
        - reminders: 등록 알람들 + 오늘 슬롯별 상태(future/due/acked/missed)
        - user_facts: { exercise, health_metric, diet_reminder, baseline } — 축별 fact 묶음
        - schedules: 등록된 모든 배치 목록
        - active_schedule: 활성 배치 + today_bucket(weekly) 또는 next_bucket_hint(sequence). 묶음은 routine_v2_slugs(루틴)을 가리킴. 없으면 null.
      list_* 함수 대신 이 함수가 모든 조회를 커버한다.

user_settings:
  - key: timezone
    type: string
    default: "Asia/Seoul"
    description: "IANA timezone. 알람 시각·오늘 날짜 판단 기준. 예 Asia/Seoul / America/Los_Angeles."
  - key: daily_kcal_reference
    type: number
    default: 0
    description: "사용자가 직접 정한 '하루 기준 칼로리'. 0 = 미설정. 마도서가 계산하지 않는다 — 사용자가 알려준 값을 그대로 저장해, 오늘 섭취 합계와 비교 표시하는 용도일 뿐."

notifications:
  function: check_reminders
  cadence: 60

visualization:
  function: render_dashboard
  cadence: 60
  height: 760
  inputSchema:
    type: object
    properties:
      tab:
        type: string
      date:
        type: string
      action:
        type: object
        properties:
          kind: { type: string }
          slug: { type: string }
          routine: { type: string }
          block_id: { type: string }
          exercise: { type: string }
          value: { type: number }
          i: { type: number }
          w: { type: string }
          r: { type: string }
          v: { type: string }
          nonce: { type: string }
