tools:
  - name: set_goal
    description: |
      사용자의 건강/안티에이징 목표를 자연어 한 문장으로 저장한다.
      goal 이 비어있을 때는 모든 응답에 앞서 이 도구로 먼저 등록한다.
      "체중 5kg 감량", "공복 혈당 100 이하 유지", "마라톤 풀코스 4시간 안에 완주" 같이 사용자가 직접 표현한 문장 그대로 저장.
      AI 가 임의로 다듬지 말 것 — 사용자 발화 원문 우선.
      반환: { goal: { text, updated_at } }
    inputSchema:
      type: object
      properties:
        text:
          type: string
          description: 사용자 본인이 말한 목표 문장 그대로. 한국어/영어 무관. 1~500자.
      required: [text]

  - name: define_routine_exercise
    description: |
      progressive overload 대상 루틴 운동을 등록한다 (squat, bench_press, deadlift, overhead_press, lat_pulldown 등).
      같은 slug 가 있으면 덮어쓴다.
      category 는 next_weight 계산 시 증량 단위에 영향 — compound 2.5kg, isolation 1.25kg.
      AI 는 사용자와 합의된 운동만 등록 (임의 등록 금지).
    inputSchema:
      type: object
      properties:
        slug:
          type: string
          description: snake_case 식별자. 예 squat / bench_press / lat_pulldown.
        display_name:
          type: string
          description: 사용자에게 보일 이름 (한글 가능). 예 "백 스쿼트".
        category:
          type: string
          description: "compound 또는 isolation. compound=다관절, isolation=단관절."
        unit:
          type: string
          description: "kg 또는 lb."
        default_rir_target:
          type: integer
          description: "다음 세트의 RIR 목표 (0~4). 보통 1~2. 생략 시 2."
        weekly_cap_kg:
          type: number
          description: "선택. 주당 최대 증량(kg). 생략하면 무제한. 과도한 증량 방지용."
      required: [slug, display_name, category, unit]

  - name: delete_routine_exercise
    description: |
      루틴 운동 정의를 삭제한다. 과거 세션 기록은 남는다.
      사용자가 명시적으로 "지워줘"라고 한 경우에만 호출.
    inputSchema:
      type: object
      properties:
        slug:
          type: string
      required: [slug]

  - name: log_routine_session
    description: |
      루틴 운동의 한 세션(여러 세트 묶음)을 기록한다.
      각 세트는 reps / weight / rir. 여기 기록된 RIR 이 next_weight 계산의 입력.
      반환: 저장 결과 + 등록된 routine 의 다음 추천 무게(계산 가능할 때). 별도로 next_weight 다시 부를 필요 없음.
    inputSchema:
      type: object
      properties:
        slug:
          type: string
          description: 등록된 routine 의 slug.
        sets:
          type: array
          description: "[{reps, weight, rir}] 배열. 각 세트의 실제 reps/weight(routine unit 따름)/rir(0~4)."
        performed_at:
          type: string
          description: "ISO 8601 시각. 생략하면 호출 시점."
        note:
          type: string
          description: 선택. 컨디션·부상 메모.
      required: [slug, sets]

  - name: log_activity
    description: |
      루틴 외 활동을 기록한다 (축구, 산책, 자전거, 등산, 수영 등).
      progressive overload 대상 아니라 자유 텍스트 name + 강도 + 시간만 받음.
      kcal 추정은 마도서가 안 함 — AI 가 강도×시간×체중으로 보조 추정.
    inputSchema:
      type: object
      properties:
        name:
          type: string
          description: "활동명 자유 텍스트. 예 '축구', '한강 자전거'."
        intensity:
          type: string
          description: "light / moderate / vigorous 중 하나. AI 가 사용자 발화로 보조 판단."
        duration_minutes:
          type: integer
          description: 분 단위.
        performed_at:
          type: string
          description: "ISO 8601 시각. 생략하면 호출 시점."
        note:
          type: string
      required: [name, intensity, duration_minutes]

  - name: define_metric
    description: |
      추적할 건강 지표를 등록한다.
      당뇨인은 fasting_glucose / post_meal_glucose / hba1c,
      근비대 추구자는 body_weight_kg / body_fat_pct / skeletal_muscle_kg / bmr,
      고혈압 환자는 systolic_bp / diastolic_bp / resting_hr —
      사람마다 다른 슬러그. AI 는 goal 을 읽고 합의된 지표만 등록 (임의 등록 금지).
      target_min/max 는 선택 — 정확한 정상범위 알 때만, 모르면 생략.
      priority=critical 은 위젯/요약에서 상위 표시 + 범위 이탈 시 강조.
    inputSchema:
      type: object
      properties:
        slug:
          type: string
          description: "snake_case 슬러그. fasting_glucose / body_fat_pct / systolic_bp 등."
        display_name:
          type: string
          description: 사용자에게 보일 이름 (한글 가능).
        unit:
          type: string
          description: "단위 문자열. mg/dL, kg, %, mmHg, bpm, kcal 등."
        target_min:
          type: number
          description: 선택. 정상범위 하한.
        target_max:
          type: number
          description: 선택. 정상범위 상한.
        priority:
          type: string
          description: "critical / high / normal 중 하나."
      required: [slug, display_name, unit, priority]

  - name: delete_metric
    description: |
      지표 정의를 삭제한다. 과거 측정 기록은 남는다.
      사용자가 명시적으로 "지워줘"라고 한 경우에만 호출.
    inputSchema:
      type: object
      properties:
        slug:
          type: string
      required: [slug]

  - name: record_metric
    description: |
      등록된 지표의 측정값 한 건을 기록한다.
      반환에 target 범위 평가 + 직전값 대비 변화 + 7일 평균 대비 변화 포함.
      AI 는 이 평가에 근거해서만 응답하되, 의학적 진단·처방 흉내는 금지.
    inputSchema:
      type: object
      properties:
        slug:
          type: string
        value:
          type: number
        measured_at:
          type: string
          description: "ISO 8601 시각. 생략하면 호출 시점."
        context:
          type: string
          description: "선택. 'fasting', 'post_meal', 'morning' 등 컨텍스트 태그."
      required: [slug, value]

  - name: log_meal
    description: |
      끼 한 건을 기록한다. name 만 필수, 영양 필드(kcal/protein_g/carbs_g/fat_g)는 모두 선택 — AI 가 사용자 발화에서 추정/보조.
      반환에 오늘(settings.timezone 기준) 끼 합계 포함.
      activity_factor>0 이고 BMR 지표(slug `bmr`)가 등록되어 있으면 maintenance 비교(today_delta_kcal)도 포함.
    inputSchema:
      type: object
      properties:
        name:
          type: string
          description: "끼 이름/메뉴. 예 '아침 — 오트밀+그릭요거트'."
        kcal:
          type: number
        protein_g:
          type: number
        carbs_g:
          type: number
        fat_g:
          type: number
        eaten_at:
          type: string
          description: "ISO 8601 시각. 생략하면 호출 시점."
      required: [name]

  - name: define_reminder
    description: |
      알람을 등록한다 — supplement(영양제) / measurement(측정) / action(행동) 모두 같은 통로.
      예: "비타민D 매일 9시" (supplement), "아침 공복 혈당 7시" (measurement, target_metric_slug=fasting_glucose), "1일 3회 인슐린 8/13/19시" (action).
      schedule 표현: "daily HH:MM" 또는 "daily HH:MM,HH:MM,...". 시각은 settings.timezone 기준.
      window_minutes 안에 ack 가 안 들어오면 푸시. 같은 id 면 덮어쓴다.
    inputSchema:
      type: object
      properties:
        id:
          type: string
          description: snake_case 식별자.
        kind:
          type: string
          description: "supplement / measurement / action 중 하나."
        label:
          type: string
          description: "사용자에게 보일 라벨. 예 '비타민D 1정', '공복 혈당 측정'."
        schedule:
          type: string
          description: "'daily 09:00' 또는 'daily 08:00,13:00,19:00'."
        window_minutes:
          type: integer
          description: "선택. 슬롯 시각부터 N분 안에 ack 안 되면 푸시. 기본 15."
        target_metric_slug:
          type: string
          description: "선택. measurement 일 때 어떤 metric 의 측정인지. ack 시 value 같이 주면 자동 record_metric 호출."
      required: [id, kind, label, schedule]

  - name: delete_reminder
    description: 알람을 삭제한다.
    inputSchema:
      type: object
      properties:
        id:
          type: string
      required: [id]

  - name: ack_reminder
    description: |
      알람 슬롯에 대한 acknowledge 를 기록한다.
      slot 형식 'YYYY-MM-DDTHH:MM' — 생략하면 호출 시점 기준 가장 가까운 과거 슬롯.
      ack 가 들어오면 푸시 워커가 같은 슬롯에 알람을 또 쏘지 않는다.
      measurement 알람이고 value 가 같이 들어오면 자동으로 record_metric 도 호출.
    inputSchema:
      type: object
      properties:
        id:
          type: string
        slot:
          type: string
          description: "선택. 'YYYY-MM-DDTHH:MM' 형식 (settings.timezone 기준 날짜)."
        value:
          type: number
          description: "선택. measurement 알람일 때 같이 들어온 측정값."
      required: [id]

  - name: get_state
    description: |
      마도서의 현재 상태를 통째로 반환한다 — 응답·추천에 앞서 반드시 호출.
      반환:
        - protocol_step: 'awaiting_goal' / 'awaiting_initial_setup' / 'operational'
        - ai_rules: AI 가 매 응답마다 지켜야 할 규약 (빈 추론 금지, 시각은 timezone 기준, 의학적 진단 흉내 금지 등)
        - recommended_next_action: 현 단계에서 AI 가 다음으로 해야 할 행동의 짧은 힌트
        - goal: { text, updated_at } 또는 null
        - settings: { timezone, activity_factor }
        - server_now / server_now_local: 추측 금지용 서버 기준 시각
        - metrics: 등록 지표들 + 각각의 최근 측정값 + target 평가 + 7일 평균 + 샘플 수
        - routines: 등록 루틴들 + 각각의 최근 세션
        - recent_activities: 최근 7일 비루틴 활동
        - meals_today: 오늘(timezone 기준) 끼 합계 + 항목
        - reminders: 등록 알람들 + 오늘 슬롯별 상태(future/due/acked/missed)
      list_* 함수 대신 이 함수가 모든 조회를 커버한다.

  - name: next_weight
    description: |
      특정 루틴 운동의 다음 세션 추천 무게를 계산해서 반환한다.
      직전 세션의 평균 RIR 과 default_rir_target 비교 → compound 2.5kg / isolation 1.25kg 단위 증감.
      weekly_cap_kg 가 설정되어 있으면 최근 7일 증량 누계가 cap 을 넘지 않도록 보호.
      세션 기록이 없으면 next_weight=null + reason 반환.
    inputSchema:
      type: object
      properties:
        slug:
          type: string
      required: [slug]

  - name: suggest_setup
    description: |
      goal 문장에 자주 동반되는 검증된 초기 셋업 템플릿을 반환한다 — '추천'이 아닌 '템플릿 사전'.
      예: goal 에 '당뇨' → fasting_glucose/post_meal_glucose/hba1c 지표 + 아침 공복 혈당 측정 알람 같은 표준 묶음.
      반환된 템플릿은 AI 가 사용자에게 그대로 제시 → 사용자 합의 → define_metric/define_reminder/define_routine_exercise 로 실제 등록.
      마도서가 임의 등록하지 않는다 — 호출 결과는 단순 후보일 뿐.

user_settings:
  - key: timezone
    type: string
    default: "Asia/Seoul"
    description: "IANA timezone. 알람 시각·오늘 날짜 판단 기준. 예 Asia/Seoul / America/Los_Angeles."
  - key: activity_factor
    type: number
    default: 0
    description: "BMR 곱셈 계수 (1.2~1.9). 0 = 합의 전(비활성). BMR 지표와 함께 등록되면 식단 maintenance 비교에 사용."

notifications:
  function: check_reminders
  cadence: 60

visualization:
  function: render_dashboard
  cadence: 60
  height: 760
  inputSchema:
    type: object
    properties:
      tab:
        type: string
